name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: 后端检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 安装依赖
        run: pip install -e '.[dev]'
      - name: Ruff 检查
        run: ruff check .
      - name: MyPy 检查
        run: mypy app
      - name: 运行测试
        run: pytest

  frontend:
    name: 前端检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安装依赖
        run: npm install
      - name: ESLint 检查
        run: npm run lint
      - name: TypeScript 检查
        run: npm run typecheck
      - name: 生产构建
        run: npm run build
