services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentradar}
      POSTGRES_USER: ${POSTGRES_USER:-agentradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentradar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      APP_NAME: ${APP_NAME:-AgentRadar}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://agentradar:agentradar@postgres:5432/agentradar}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_TIMEOUT_SECONDS: ${GITHUB_TIMEOUT_SECONDS:-15}
      GITHUB_MAX_RETRIES: ${GITHUB_MAX_RETRIES:-2}
      GITHUB_CACHE_TTL_SECONDS: ${GITHUB_CACHE_TTL_SECONDS:-300}
      TRENDING_SCHEDULER_ENABLED: ${TRENDING_SCHEDULER_ENABLED:-false}
      TRENDING_COLLECTION_INTERVAL_HOURS: ${TRENDING_COLLECTION_INTERVAL_HOURS:-6}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
